<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beacon Chat</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <div class="sidebar">
        <h2>BEACON</h2>

        <div class="user-list">
            <h3>Online Users</h3>

            <ul>
                <li>🟢 Bunny</li>
                <li>🟢 Alex</li>
                <li>🟢 John</li>
            </ul>
        </div>
    </div>

    <div class="chat-section">

        <div class="chat-header">
            <div>
                <h3>#General chat</h3>
                <small>3 users Online</small>
            </div>
        </div>

        <div class="chat-box">

            <div class="message received">
                Hello Bunny 👋
            </div>

            <div class="message sent">
                Hi everyone!
            </div>

        </div>

        <div class="message-input">

            <input
                type="text"
                placeholder="Type a message..."
            >

            <button>Send</button>

        </div>

    </div>

</div>

<script src="script.js"></script>

<div id="join-screen">


</div>
<div id="chat-screen">
    
</div>

</body>
</html>
